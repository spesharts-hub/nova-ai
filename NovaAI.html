            <div id="gameZone">
                <button class="game-btn" id="startGameBtn">Запустить игру</button>
                <div id="player"></div>
                <div id="monster"></div>
                <div id="scoreBoard">Счет: 0</div>
            </div>

            <div class="result-content" id="resultContent"></div>
            <button class="copy-btn" id="copyResultBtn">Копировать код</button>
        </div>
    </div>

    <input type="file" id="fileInput" style="display:none" accept=".txt,.js,.html,.css,.json,.md">

    <script>
        // ============================================================
        // ОСНОВНОЙ КОД + ИНТЕГРАЦИЯ С НАСТОЯЩИМ ИИ
        // ============================================================

        (function() {
            // Запрет зума
            document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
            document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
            document.addEventListener('gestureend', function(e) { e.preventDefault(); });
            
            document.addEventListener('touchmove', function (event) {
                if (event.scale !== undefined && event.scale !== 1) { event.preventDefault(); }
            }, { passive: false });

            // Обработка клавиатуры на мобильных
            const inputArea = document.getElementById('inputArea');
            
            window.addEventListener('resize', function() {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    const activeElement = document.activeElement;
                    if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')) {
                        const rect = activeElement.getBoundingClientRect();
                        const windowHeight = window.innerHeight;
                        const keyboardHeight = windowHeight - rect.bottom;
                        if (keyboardHeight > 50) {
                            inputArea.classList.add('keyboard-active');
                        } else {
                            inputArea.classList.remove('keyboard-active');
                        }
                    } else {
                        inputArea.classList.remove('keyboard-active');
                    }
                }
            });

            document.addEventListener('focusin', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    setTimeout(() => {
                        const isMobile = window.innerWidth <= 768;
                        if (isMobile) {
                            const rect = e.target.getBoundingClientRect();
                            const windowHeight = window.innerHeight;
                            const keyboardHeight = windowHeight - rect.bottom;
                            if (keyboardHeight > 50) {
                                inputArea.classList.add('keyboard-active');
                            }
                        }
                    }, 200);
                }
            });

            document.addEventListener('focusout', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    inputArea.classList.remove('keyboard-active');
                }
            });

            // Звёзды
            (function createStars() {
                const c = document.getElementById('starsBg');
                for (let i = 0; i < 120; i++) {
                    const s = document.createElement('div');
                    s.className = 'star-bg';
                    const size = Math.random() * 2.5 + 0.5;
                    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s`;
                    c.appendChild(s);
                }
            })();

            // ============================================================
            // 1. БАЗОВЫЕ ЭЛЕМЕНТЫ
            // ============================================================
            const chatMessages = document.getElementById('chatMessages');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const chatList = document.getElementById('chatList');
            const newChatBtn = document.getElementById('newChatBtn');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const menuToggle = document.getElementById('menuToggle');
            const chatTitle = document.getElementById('chatTitle');
            const sidebarBrand = document.getElementById('sidebarBrand');
            const settingsBtnSidebar = document.getElementById('settingsBtnSidebar');
            const settingsOverlay = document.getElementById('settingsOverlay');
            const closeSettings = document.getElementById('closeSettings');
            const aiNameInput = document.getElementById('aiNameInput');
            const doneBtn = document.getElementById('doneBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const resultOverlay = document.getElementById('resultOverlay');
            const resultContent = document.getElementById('resultContent');
            const closeResult = document.getElementById('closeResult');
            const copyResultBtn = document.getElementById('copyResultBtn');
            
            const gameZone = document.getElementById('gameZone');
            const startGameBtn = document.getElementById('startGameBtn');
            const player = document.getElementById('player');
            const monster = document.getElementById('monster');
            const scoreBoard = document.getElementById('scoreBoard');

            const clearChatBtn = document.getElementById('clearChatBtn');
            const undoChatBtn = document.getElementById('undoChatBtn');
            const shareChatBtn = document.getElementById('shareChatBtn');
            const exportChatBtn = document.getElementById('exportChatBtn');
            const fileAttachBtn = document.getElementById('fileAttachBtn');
            const fileInput = document.getElementById('fileInput');
            const voiceInputBtn = document.getElementById('voiceInputBtn');
            const themeToggle = document.getElementById('themeToggle');
            const exportChatsBtn = document.getElementById('exportChatsBtn');
            const importChatsBtn = document.getElementById('importChatsBtn');
            const testConnectionBtn = document.getElementById('testConnectionBtn');
            const connectionStatus = document.getElementById('connectionStatus');

            // ============================================================
            // 2. СОСТОЯНИЕ
            // ============================================================
            let state = {
                chats: [],
                currentChatId: null,
                currentColor: '#6c5ce7',
                assistantName: 'Nova',
                isTyping: false
            };

            const history = [];
            const MAX_HISTORY = 50;

            function pushHistory() {
                const chat = getCurrentChat();
                if (!chat) return;
                const snapshot = JSON.stringify(chat.messages);
                history.push(snapshot);
                if (history.length > MAX_HISTORY) history.shift();
            }

            function undoLastAction() {
                if (history.length < 2) {
                    showNotification('Нет действий для отмены');
                    return;
                }
                history.pop();
                const prev = JSON.parse(history[history.length - 1]);
                const chat = getCurrentChat();
                if (!chat) return;
                chat.messages = prev;
                saveChats();
                renderMessages();
                showNotification('Действие отменено');
            }

            function showNotification(text, duration = 2000) {
                const existing = document.querySelector('.nova-notification');
                if (existing) existing.remove();
                const div = document.createElement('div');
                div.className = 'nova-notification';
                div.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,0.9);color:white;padding:12px 24px;border-radius:12px;z-index:9999;font-size:14px;font-weight:500;animation:slideUp 0.3s ease;backdrop-filter:blur(10px);font-family:Segoe UI,sans-serif;';
                div.textContent = text;
                document.body.appendChild(div);
                setTimeout(() => { div.remove(); }, duration);
            }

            // ============================================================
            // 3. РАБОТА С ЧАТАМИ
            // ============================================================
            function loadChats() {
                const saved = localStorage.getItem('nova_chats_v2');
                if (saved) {
                    try {
                        state.chats = JSON.parse(saved);
                        if (state.chats.length === 0) createNewChat();
                        else state.currentChatId = state.chats[0].id;
                    } catch { createNewChat(); }
                } else { createNewChat(); }
                renderChats();
                renderMessages();
                applyColor();
                pushHistory();
            }

            function saveChats() {
                localStorage.setItem('nova_chats_v2', JSON.stringify(state.chats));
                pushHistory();
            }

            function createNewChat() {
                const id = Date.now();
                const chat = {
                    id: id,
                    name: 'Новый чат',
                    messages: [{ role: 'ai', content: 'Привет! Опиши, что хочешь создать, и я помогу тебе.' }],
                    context: { category: null, asked: [] }
                };
                state.chats.unshift(chat);
                state.currentChatId = id;
                saveChats();
                renderChats();
                renderMessages();
                return chat;
            }

            function deleteChat(id) {
                if (state.chats.length <= 1) return;
                state.chats = state.chats.filter(c => c.id !== id);
                if (state.currentChatId === id) state.currentChatId = state.chats[0].id;
                saveChats();
                renderChats();
                renderMessages();
            }

            function getCurrentChat() {
                return state.chats.find(c => c.id === state.currentChatId);
            }

            function renderChats() {
                chatList.innerHTML = '';
                state.chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = `chat-item${chat.id === state.currentChatId ? ' active' : ''}`;
                    div.innerHTML = `<span class="chat-icon">✦</span><span class="chat-name">${chat.name}</span><span class="chat-del" data-id="${chat.id}">✕</span>`;
                    div.addEventListener('click', () => {
                        state.currentChatId = chat.id;
                        renderChats();
                        renderMessages();
                        closeSidebar();
                        pushHistory();
                    });
                    const del = div.querySelector('.chat-del');
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteChat(chat.id);
                    });
                    chatList.appendChild(div);
                });
            }

            function renderMessages() {
                const chat = getCurrentChat();
                if (!chat) return;
                chatMessages.innerHTML = '';
                chat.messages.forEach((msg) => {
                    const div = document.createElement('div');
                    div.className = `msg ${msg.role}`;
                    const sender = document.createElement('div');
                    sender.className = 'sender';
                    if (msg.role === 'user') sender.textContent = 'Вы';
                    else sender.innerHTML = `<span class="ai-name" style="color:${state.currentColor};">${state.assistantName}</span>`;
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    if (msg.role === 'user') {
                        bubble.style.background = `linear-gradient(135deg, ${state.currentColor}, ${state.currentColor}dd)`;
                    }
                    bubble.innerHTML = msg.content;
                    div.appendChild(sender);
                    div.appendChild(bubble);
                    chatMessages.appendChild(div);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
                updateTitle();
            }

            function updateTitle() {
                chatTitle.textContent = state.assistantName;
                sidebarBrand.textContent = state.assistantName;
                applyColor();
            }

            function applyColor() {
                const grad = `linear-gradient(135deg, ${state.currentColor}, ${state.currentColor}dd)`;
                chatTitle.style.background = grad;
                chatTitle.style.webkitBackgroundClip = 'text';
                chatTitle.style.webkitTextFillColor = 'transparent';
                sidebarBrand.style.background = grad;
                sidebarBrand.style.webkitBackgroundClip = 'text';
                sidebarBrand.style.webkitTextFillColor = 'transparent';

                document.querySelectorAll('.msg.user .bubble').forEach(el => { el.style.background = grad; });
                document.querySelectorAll('.ai-name').forEach(el => el.style.color = state.currentColor);
                sendBtn.style.background = grad;
                doneBtn.style.background = grad;
                
                document.querySelectorAll('.new-chat-btn').forEach(el => {
                    el.style.borderColor = `${state.currentColor}44`;
                    el.style.background = `${state.currentColor}14`;
                });
                document.querySelectorAll('.chat-item.active').forEach(el => {
                    el.style.background = `${state.currentColor}20`;
                    el.style.borderColor = `${state.currentColor}33`;
                });
                settingsBtnSidebar.style.color = state.currentColor;
            }

            // ============================================================
            // 4. ДОБАВЛЕНИЕ СООБЩЕНИЙ
            // ============================================================
            function addMessage(role, content, save = true) {
                const chat = getCurrentChat();
                if (!chat) return;
                chat.messages.push({ role, content });
                if (save) {
                    saveChats();
                    pushHistory();
                }
                
                const div = document.createElement('div');
                div.className = `msg ${role}`;
                const sender = document.createElement('div');
                sender.className = 'sender';
                if (role === 'user') sender.textContent = 'Вы';
                else sender.innerHTML = `<span class="ai-name" style="color:${state.currentColor};">${state.assistantName}</span>`;
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                if (role === 'user') {
                    bubble.style.background = `linear-gradient(135deg, ${state.currentColor}, ${state.currentColor}dd)`;
                }
                bubble.innerHTML = content;
                div.appendChild(sender);
                div.appendChild(bubble);
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                applyColor();

                if (role === 'user') processAI(chat);
            }

            // ============================================================
            // 5. НАСТОЯЩИЙ ИИ (С ИНТЕГРАЦИЕЙ)
            // ============================================================
            
            // Конфигурация ИИ
            const AI_CONFIG = {
                provider: 'openai',
                model: 'gpt-3.5-turbo',
                apiKey: '',
                mode: 'auto',
                style: 'concise',
                temperature: 0.7,
                maxTokens: 500
            };

            function loadAIConfig() {
                const saved = localStorage.getItem('nova_ai_config');
                if (saved) {
                    try {
                        const config = JSON.parse(saved);
                        Object.assign(AI_CONFIG, config);
                    } catch(e) {}
                }
                // Загружаем из полей
                const modeSelect = document.getElementById('aiMode');
                const providerSelect = document.getElementById('aiProvider');
                const modelSelect = document.getElementById('aiModel');
                const styleSelect = document.getElementById('responseStyle');
                const keyInput = document.getElementById('apiKeyInput');

                if (modeSelect) modeSelect.value = AI_CONFIG.mode;
                if (providerSelect) providerSelect.value = AI_CONFIG.provider;
                if (modelSelect) modelSelect.value = AI_CONFIG.model;
                if (styleSelect) styleSelect.value = AI_CONFIG.style;
                if (keyInput) keyInput.value = AI_CONFIG.apiKey || '';

                // Сохраняем изменения
                [modeSelect, providerSelect, modelSelect, styleSelect, keyInput].forEach(el => {
                    if (el) {
                        el.addEventListener('change', () => saveAIConfig());
                        if (el === keyInput) {
                            el.addEventListener('input', () => saveAIConfig());
                        }
                    }
                });
            }

            function saveAIConfig() {
                const modeSelect = document.getElementById('aiMode');
                const providerSelect = document.getElementById('aiProvider');
                const modelSelect = document.getElementById('aiModel');
                const styleSelect = document.getElementById('responseStyle');
                const keyInput = document.getElementById('apiKeyInput');

                AI_CONFIG.mode = modeSelect ? modeSelect.value : 'auto';
                AI_CONFIG.provider = providerSelect ? providerSelect.value : 'openai';
                AI_CONFIG.model = modelSelect ? modelSelect.value : 'gpt-3.5-turbo';
                AI_CONFIG.style = styleSelect ? styleSelect.value : 'concise';
                AI_CONFIG.apiKey = keyInput ? keyInput.value.trim() : '';

                localStorage.setItem('nova_ai_config', JSON.stringify(AI_CONFIG));
                
                if (AI_CONFIG.apiKey) {
                    testConnection();
                }
            }

            function updateStatus(status, text) {
                const dot = document.getElementById('statusDot');
                const textEl = document.getElementById('statusText');
                if (dot) {
                    dot.className = 'status-dot ' + status;
                }
                if (textEl) {
                    textEl.textContent = text;
                }
            }

            // Поиск в интернете
            async function searchWeb(query) {
                try {
                    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    let results = [];
                    if (data.AbstractText) {
                        results.push(data.AbstractText);
                    }
                    if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                        for (const topic of data.RelatedTopics.slice(0, 3)) {
                            if (topic.Text) {
                                results.push(topic.Text);
                            }
                        }
                    }
                    if (results.length === 0 && data.Results && data.Results.length > 0) {
                        for (const res of data.Results.slice(0, 2)) {
                            if (res.Text) {
                                results.push(res.Text);
                            }
                        }
                    }
                    
                    return results.length > 0 ? results.join('\n') : null;
                } catch(e) {
                    console.error('Search error:', e);
                    return null;
                }
            }

            // Отправка запроса к ИИ
            async function sendAIRequest(prompt, historyMessages = [], testMode = false) {
                const { provider, model, apiKey, temperature, maxTokens, style } = AI_CONFIG;
                
                if (!apiKey && !testMode) {
                    return { success: false, error: 'API ключ не указан. Добавьте ключ в настройках.' };
                }

                let systemPrompt = 'Ты — Nova, умный ИИ-помощник. Отвечай кратко, по существу, без воды. Используй простой язык.';
                
                if (style === 'concise') {
                    systemPrompt += ' Отвечай максимально кратко (1-3 предложения).';
                } else if (style === 'detailed') {
                    systemPrompt += ' Отвечай развёрнуто и подробно, но по теме.';
                } else if (style === 'creative') {
                    systemPrompt += ' Отвечай креативно и образно.';
                }

                const messages = [
                    { role: 'system', content: systemPrompt }
                ];

                const recentHistory = historyMessages.slice(-10);
                for (const msg of recentHistory) {
                    messages.push({
                        role: msg.role === 'user' ? 'user' : 'assistant',
                        content: msg.content
                    });
                }

                messages.push({ role: 'user', content: prompt });

                try {
                    let response;
                    if (provider === 'openai') {
                        response = await callOpenAI(messages, model, apiKey, temperature, maxTokens);
                    } else if (provider === 'deepseek') {
                        response = await callDeepSeek(messages, model, apiKey, temperature, maxTokens);
                    } else {
                        return { success: false, error: 'Неизвестный провайдер' };
                    }

                    return response;
                } catch(e) {
                    return { success: false, error: e.message || 'Ошибка запроса' };
                }
            }

            async function callOpenAI(messages, model, apiKey, temperature, maxTokens) {
                const url = 'https://api.openai.com/v1/chat/completions';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model || 'gpt-3.5-turbo',
                        messages,
                        temperature: temperature || 0.7,
                        max_tokens: maxTokens || 500,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { success: false, error: error.error?.message || `HTTP ${response.status}` };
                }

                const data = await response.json();
                return {
                    success: true,
                    content: data.choices[0]?.message?.content || 'Нет ответа'
                };
            }

            async function callDeepSeek(messages, model, apiKey, temperature, maxTokens) {
                const url = 'https://api.deepseek.com/v1/chat/completions';
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model || 'deepseek-chat',
                        messages,
                        temperature: temperature || 0.7,
                        max_tokens: maxTokens || 500,
                        stream: false
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    return { success: false, error: error.error?.message || `HTTP ${response.status}` };
                }

                const data = await response.json();
                return {
                    success: true,
                    content: data.choices[0]?.message?.content || 'Нет ответа'
                };
            }

            function needsWebSearch(message) {
                const keywords = [
                    'погод', 'новост', 'сегодня', 'завтра', 'вчера', 'последн', 'сейчас',
                    'курс', 'доллар', 'евро', 'рубль', 'цена', 'стоимость', 'скидк',
                    'новый', 'вышел', 'релиз', 'анонс', 'событи', 'мероприят',
                    'результат', 'матч', 'игр', 'спорт', 'футбол', 'хоккей',
                    'ваканси', 'работа', 'зарплат', 'бюджет', 'политик',
                    'акци', 'криптов', 'биткоин', 'эфир', 'рынок'
                ];
                const lower = message.toLowerCase();
                return keywords.some(k => lower.includes(k));
            }

            async function testConnection() {
                if (!AI_CONFIG.apiKey) {
                    updateStatus('offline', 'нет ключа');
                    if (connectionStatus) {
                        connectionStatus.textContent = '❌ нет ключа';
                        connectionStatus.style.color = '#e17055';
                    }
                    return false;
                }

                try {
                    updateStatus('searching', 'проверка...');
                    if (connectionStatus) {
                        connectionStatus.textContent = '⏳ проверка...';
                        connectionStatus.style.color = '#fdcb6e';
                    }
                    const result = await sendAIRequest('Привет! Проверка подключения.', [], true);
                    if (result && result.success) {
                        updateStatus('online', 'подключен');
                        if (connectionStatus) {
                            connectionStatus.textContent = '✅ подключен';
                            connectionStatus.style.color = '#00b894';
                        }
                        return true;
                    } else {
                        updateStatus('offline', 'ошибка: ' + (result?.error || 'неизвестно'));
                        if (connectionStatus) {
                            connectionStatus.textContent = '❌ ' + (result?.error || 'ошибка');
                            connectionStatus.style.color = '#e17055';
                        }
                        return false;
                    }
                } catch(e) {
                    updateStatus('offline', 'ошибка: ' + e.message);
                    if (connectionStatus) {
                        connectionStatus.textContent = '❌ ' + e.message;
                        connectionStatus.style.color = '#e17055';
                    }
                    return false;
                }
            }

            // ГЛАВНАЯ ФУНКЦИЯ ОБРАБОТКИ ЗАПРОСА
            async function getAIResponse(userMessage, chatHistory) {
                updateStatus('thinking', 'думаю...');
                
                const { mode } = AI_CONFIG;
                let webInfo = null;
                let aiResponse = null;

                try {
                    const needsWeb = mode === 'web' || 
                                    (mode === 'auto' && needsWebSearch(userMessage)) ||
                                    mode === 'hybrid';

                    if (needsWeb) {
                        updateStatus('searching', 'поиск...');
                        webInfo = await searchWeb(userMessage);
                    }

                    if (mode === 'web' && webInfo) {
                        updateStatus('online', 'готово');
                        return webInfo;
                    }

                    if (mode === 'web' && !webInfo) {
                        updateStatus('online', 'готово');
                        return 'Не удалось найти информацию по вашему запросу. Попробуйте переформулировать вопрос.';
                    }

                    let enhancedPrompt = userMessage;
                    
                    if (webInfo) {
                        enhancedPrompt = `Пользователь спросил: "${userMessage}"\n\nВот информация из интернета по теме:\n${webInfo}\n\nНа основе этой информации, дай краткий ответ на вопрос пользователя.`;
                    }

                    if (mode === 'hybrid' && webInfo) {
                        enhancedPrompt = `Пользователь спросил: "${userMessage}"\n\nИнформация из интернета:\n${webInfo}\n\nДай краткий ответ, используя эту информацию и свои знания.`;
                    }

                    updateStatus('thinking', 'генерация...');
                    const result = await sendAIRequest(enhancedPrompt, chatHistory);

                    if (result && result.success) {
                        aiResponse = result.content;
                    } else {
                        aiResponse = result?.error || 'Извините, произошла ошибка. Проверьте API ключ.';
                    }

                    updateStatus('online', 'готово');
                    return aiResponse;

                } catch(e) {
                    updateStatus('offline', 'ошибка');
                    return 'Произошла ошибка: ' + e.message;
                }
            }

            // ============================================================
            // 6. ОБРАБОТКА СООБЩЕНИЙ С ИИ
            // ============================================================
            async function processAI(chat) {
                if (state.isTyping) return;
                state.isTyping = true;
                sendBtn.disabled = true;

                const typingDiv = document.createElement('div');
                typingDiv.className = 'msg ai';
                typingDiv.id = 'typingIndicator';
                typingDiv.innerHTML = `<div class="sender"><span class="ai-name" style="color:${state.currentColor};">${state.assistantName}</span></div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                const lastUserMsg = chat.messages.filter(m => m.role === 'user').pop();
                const userMessage = lastUserMsg ? lastUserMsg.content : '';

                try {
                    const history = chat.messages
                        .filter(m => m.role === 'user' || m.role === 'ai')
                        .map(m => ({ role: m.role, content: m.content }));

                    const response = await getAIResponse(userMessage, history);

                    chat.messages.push({ role: 'ai', content: response });
                    saveChats();

                    const typing = document.getElementById('typingIndicator');
                    if (typing) typing.remove();

                    const div = document.createElement('div');
                    div.className = 'msg ai';
                    const sender = document.createElement('div');
                    sender.className = 'sender';
                    sender.innerHTML = `<span class="ai-name" style="color:${state.currentColor};">${state.assistantName}</span>`;
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.innerHTML = response;
                    div.appendChild(sender);
                    div.appendChild(bubble);
                    chatMessages.appendChild(div);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    applyColor();

                    if (chat.name === 'Новый чат' && userMessage) {
                        const newName = userMessage.slice(0, 30) + (userMessage.length >= 30 ? '...' : '');
                        chat.name = newName;
                        saveChats();
                        renderChats();
                    }

                } catch(e) {
                    const typing = document.getElementById('typingIndicator');
                    if (typing) typing.remove();
                    showNotification('Ошибка: ' + e.message);
                }

                state.isTyping = false;
                sendBtn.disabled = false;
                userInput.focus();
            }

            // ============================================================
            // 7. ОСТАЛЬНЫЕ ФУНКЦИИ
            // ============================================================
            function handleSend() {
                const text = userInput.value.trim();
                if (!text || state.isTyping) return;
                userInput.value = '';
                addMessage('user', text);
            }

            function toggleSidebar() {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('show');
            }

            function closeSidebar() {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            }

            function setAccentColor(color) {
                state.currentColor = color;
                applyColor();
                document.querySelectorAll('.color-option').forEach(el => {
                    el.classList.toggle('active', el.dataset.color === color);
                });
                localStorage.setItem('nova_color', color);
            }

            function toggleSettings() { settingsOverlay.classList.toggle('show'); }

            function toggleTheme() {
                document.body.classList.toggle('light-theme');
                const isLight = document.body.classList.contains('light-theme');
                localStorage.setItem('nova_theme', isLight ? 'light' : 'dark');
                themeToggle.textContent = isLight ? '🌑 Тёмная тема' : '🌓 Светлая тема';
            }

            function shareChat() {
                const chat = getCurrentChat();
                if (!chat) return;
                const encoded = encodeURIComponent(JSON.stringify(chat.messages));
                const url = new URL(window.location);
                url.searchParams.set('chat', encoded);
                navigator.clipboard.writeText(url.toString()).then(() => {
                    showNotification('Ссылка на чат скопирована!');
                }).catch(() => {
                    showNotification('Не удалось скопировать ссылку');
                });
            }

            function exportCurrentChat() {
                const chat = getCurrentChat();
                if (!chat) return;
                const data = JSON.stringify(chat, null, 2);
                const blob = new Blob([data], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `nova_chat_${chat.name.slice(0,20)}_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showNotification('Чат экспортирован!');
            }

            function exportAllChats() {
                const data = JSON.stringify(state.chats, null, 2);
                const blob = new Blob([data], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `nova_all_chats_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showNotification('Все чаты экспортированы!');
            }

            function importChats() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        try {
                            const data = JSON.parse(ev.target.result);
                            if (Array.isArray(data) && data.length > 0 && data[0].id) {
                                state.chats = data;
                                state.currentChatId = state.chats[0].id;
                                saveChats();
                                renderChats();
                                renderMessages();
                                showNotification('Чаты импортированы!');
                            } else if (data.id && data.messages) {
                                state.chats.unshift(data);
                                state.currentChatId = data.id;
                                saveChats();
                                renderChats();
                                renderMessages();
                                showNotification('Чат импортирован!');
                            } else {
                                showNotification('Неверный формат файла');
                            }
                        } catch(err) {
                            showNotification('Ошибка при импорте: ' + err.message);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            function clearChat() {
                const chat = getCurrentChat();
                if (!chat) return;
                if (!confirm('Очистить все сообщения в этом чате?')) return;
                pushHistory();
                chat.messages = [{ role: 'ai', content: 'Привет! Опиши, что хочешь создать, и я помогу тебе.' }];
                chat.context = { category: null, asked: [] };
                saveChats();
                renderMessages();
                showNotification('Чат очищен');
            }

            function generateCodeResult(category) {
                if (category === 'game') {
                    return `// Сгенерированный код мини-игры "Побег от монстра"
function initGame() {
    let player = document.getElementById('player');
    let monster = document.getElementById('monster');
    // Логика перемещения и расчёта хитбоксов х24px
    console.log("Игра успешно инициализирована!");
}`;
                } else {
                    return `/* Автоматически созданные стили интерфейса */
body {
    background: linear-gradient(135deg, #0a0a1a 0%, #111122 100%);
    color: #e0e0ff;
}`;
                }
            }

            // Игровой модуль
            const GameModule = (function() {
                let gameInterval = null;
                let pTop = 150, pLeft = 50, mTop = 147, mLeft = 500, score = 0;
                let isPlaying = false;

                function reset() {
                    clearInterval(gameInterval);
                    gameInterval = null;
                    isPlaying = false;
                    startGameBtn.style.display = 'block';
                    player.style.display = 'none';
                    monster.style.display = 'none';
                    scoreBoard.style.display = 'none';
                    gameZone.style.background = '#000';
                    window.onkeydown = null;
                }

                function start() {
                    reset();
                    startGameBtn.style.display = 'none';
                    player.style.display = 'block';
                    monster.style.display = 'block';
                    scoreBoard.style.display = 'block';
                    gameZone.style.background = '#111222';
                    
                    pTop = 150; pLeft = 50; mTop = 147; mLeft = 500; score = 0;
                    player.style.top = pTop + 'px'; player.style.left = pLeft + 'px';
                    monster.style.left = mLeft + 'px'; monster.style.top = mTop + 'px';
                    
                    isPlaying = true;
                    scoreBoard.textContent = "Счет: " + score;

                    window.onkeydown = function(e) {
                        if (!isPlaying) return;
                        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ц') pTop = Math.max(0, pTop - 15);
                        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'ы') pTop = Math.min(320, pTop + 15);
                        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ф') pLeft = Math.max(0, pLeft - 15);
                        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'в') pLeft = Math.min(570, pLeft + 15);
                        
                        player.style.top = pTop + 'px';
                        player.style.left = pLeft + 'px';
                    };

                    gameInterval = setInterval(() => {
                        if (!isPlaying) return;
                        score++;
                        scoreBoard.textContent = "Счет: " + score;

                        if (mLeft > pLeft) mLeft -= 3; else mLeft += 3;
                        if (mTop > pTop) mTop -= 3; else mTop += 3;

                        monster.style.left = mLeft + 'px';
                        monster.style.top = mTop + 'px';

                        if (Math.abs(pLeft - mLeft) < 22 && Math.abs(pTop - mTop) < 22) {
                            alert("Монстр поймал тебя! Твой итоговый счет: " + score);
                            reset();
                        }
                    }, 30);
                }

                function stop() {
                    isPlaying = false;
                    clearInterval(gameInterval);
                    reset();
                }

                return { start, stop, reset };
            })();

            function runAiGeneration() {
                const chat = getCurrentChat();
                if (!chat) return;

                loadingOverlay.style.display = 'flex';
                const delay = Math.floor(Math.random() * 3001) + 3000; 

                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    resultOverlay.classList.add('show');
                    
                    const category = chat.context.category || 'general';
                    
                    if (category === 'game') {
                        gameZone.style.display = 'flex';
                        resultContent.style.display = 'none';
                        copyResultBtn.style.display = 'none';
                        GameModule.reset();
                    } else {
                        gameZone.style.display = 'none';
                        resultContent.style.display = 'block';
                        copyResultBtn.style.display = 'block';
                        resultContent.textContent = generateCodeResult(category);
                    }
                }, delay);
            }

            // ============================================================
            // 8. ИНИЦИАЛИЗАЦИЯ
            // ============================================================
            function init() {
                const savedTheme = localStorage.getItem('nova_theme');
                if (savedTheme === 'light') {
                    document.body.classList.add('light-theme');
                    themeToggle.textContent = '🌑 Тёмная тема';
                }

                loadAIConfig();
                loadChats();

                sendBtn.addEventListener('click', handleSend);
                userInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                });
                newChatBtn.addEventListener('click', () => {
                    createNewChat();
                    closeSidebar();
                });
                menuToggle.addEventListener('click', toggleSidebar);
                sidebarOverlay.addEventListener('click', closeSidebar);

                doneBtn.addEventListener('click', runAiGeneration);
                
                closeResult.addEventListener('click', function() {
                    GameModule.stop();
                    resultOverlay.classList.remove('show');
                });
                resultOverlay.addEventListener('click', (e) => {
                    if (e.target === resultOverlay) {
                        GameModule.stop();
                        resultOverlay.classList.remove('show');
                    }
                });

                startGameBtn.addEventListener('click', GameModule.start);

                copyResultBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(resultContent.textContent).then(() => {
                        const old = copyResultBtn.textContent;
                        copyResultBtn.textContent = 'Скопировано!';
                        setTimeout(() => { copyResultBtn.textContent = 'Копировать код'; }, 1500);
                    });
                });

                settingsBtnSidebar.addEventListener('click', toggleSettings);
                closeSettings.addEventListener('click', toggleSettings);
                settingsOverlay.addEventListener('click', (e) => {
                    if (e.target === settingsOverlay) toggleSettings();
                });

                document.querySelectorAll('#settingsColorOptions .color-option').forEach(el => {
                    el.addEventListener('click', function() { setAccentColor(this.dataset.color); });
                });

                document.querySelectorAll('.preset-colors .color-btn').forEach(el => {
                    el.addEventListener('click', function() { setAccentColor(this.dataset.color); });
                });

                aiNameInput.addEventListener('input', function() {
                    state.assistantName = this.value || 'Nova';
                    localStorage.setItem('nova_name', state.assistantName);
                    renderMessages();
                });

                clearChatBtn.addEventListener('click', clearChat);
                undoChatBtn.addEventListener('click', undoLastAction);
                shareChatBtn.addEventListener('click', shareChat);
                exportChatBtn.addEventListener('click', exportCurrentChat);
                exportChatsBtn.addEventListener('click', exportAllChats);
                importChatsBtn.addEventListener('click', importChats);
                themeToggle.addEventListener('click', toggleTheme);

                testConnectionBtn.addEventListener('click', async function() {
                    const result = await testConnection();
                    if (result) {
                        showNotification('✅ Подключение успешно!');
                    } else {
                        showNotification('❌ Ошибка подключения. Проверьте ключ.');
                    }
                });

                fileAttachBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    fileInput.click();
                });
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const content = ev.target.result;
                        userInput.value = content.slice(0, 500) + (content.length > 500 ? '\n... (файл обрезан)' : '');
                        showNotification(`Файл "${file.name}" загружен (${content.length} символов)`);
                    };
                    reader.readAsText(file);
                    fileInput.value = '';
                });

                voiceInputBtn.addEventListener('click', function() {
                    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                        showNotification('Голосовой ввод не поддерживается в этом браузере');
                        return;
                    }
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'ru-RU';
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    
                    showNotification('🎤 Говорите...');
                    recognition.start();
                    
                    recognition.onresult = function(e) {
                        const text = e.results[0][0].transcript;
                        userInput.value = text;
                        showNotification(`Распознано: "${text}"`);
                        setTimeout(handleSend, 300);
                    };
                    recognition.onerror = function(e) {
                        showNotification('Ошибка распознавания: ' + e.error);
                    };
                });

                const savedColor = localStorage.getItem('nova_color');
                const savedName = localStorage.getItem('nova_name');
                if (savedColor) { setAccentColor(savedColor); }
                if (savedName) {
                    state.assistantName = savedName;
                    aiNameInput.value = savedName;
                    renderMessages();
                }

                userInput.focus();

                const params = new URLSearchParams(window.location.search);
                const chatData = params.get('chat');
                if (chatData) {
                    try {
                        const messages = JSON.parse(decodeURIComponent(chatData));
                        if (Array.isArray(messages) && messages.length > 0) {
                            const chat = getCurrentChat();
                            if (chat) {
                                chat.messages = messages;
                                chat.name = 'Импортированный чат';
                                saveChats();
                                renderMessages();
                                renderChats();
                                showNotification('Чат загружен из ссылки!');
                            }
                        }
                    } catch(e) {}
                }
            }

            init();
        })();
    </script>
</body>
</html>
