<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova — Умный ИИ помощник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: #0a0a1a;
            display: flex;
            touch-action: none;
            transition: background 0.3s;
        }
        body.light-theme {
            background: #f0f0fa;
        }
        body.light-theme .stars-bg { display: none; }
        body.light-theme .nebula-bg { display: none; }
        body.light-theme .sidebar { background: rgba(240, 240, 250, 0.92); border-right: 1px solid rgba(108, 92, 231, 0.1); }
        body.light-theme .sidebar-header .brand { color: #2d2d44; }
        body.light-theme .chat-item { color: #555577; }
        body.light-theme .chat-item:hover { background: rgba(108, 92, 231, 0.05); color: #2d2d44; }
        body.light-theme .chat-item.active { background: rgba(108, 92, 231, 0.08); }
        body.light-theme .main-area { background: rgba(240, 240, 250, 0.6); }
        body.light-theme .chat-header { border-bottom: 1px solid rgba(0,0,0,0.04); }
        body.light-theme .chat-header .left .chat-title { color: #2d2d44; }
        body.light-theme .msg.ai .bubble { background: rgba(0,0,0,0.04); color: #333355; border: 1px solid rgba(0,0,0,0.04); }
        body.light-theme .input-area { background: rgba(240, 240, 250, 0.8); border-top: 1px solid rgba(0,0,0,0.04); }
        body.light-theme .input-wrapper { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); }
        body.light-theme .input-row input { color: #2d2d44; }
        body.light-theme .input-row input::placeholder { color: #9999bb; }
        body.light-theme .settings-panel { background: rgba(240, 240, 250, 0.95); }
        body.light-theme .settings-panel h2 { color: #2d2d44; }
        body.light-theme .setting-group label { color: #666688; }
        body.light-theme .setting-group input[type="text"] { background: rgba(0,0,0,0.04); color: #2d2d44; border: 1px solid rgba(0,0,0,0.08); }
        body.light-theme .result-panel { background: rgba(240, 240, 250, 0.95); }
        body.light-theme .result-panel .top h2 { color: #2d2d44; }
        body.light-theme .result-panel .result-content { background: rgba(0,0,0,0.04); color: #333355; }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        .star-bg {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkleBg var(--duration) infinite ease-in-out;
        }
        @keyframes twinkleBg {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .nebula-bg {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .nebula-bg1 { width: 500px; height: 500px; background: #6c5ce7; top: -100px; right: -100px; animation: floatNebula 20s infinite alternate; }
        .nebula-bg2 { width: 400px; height: 400px; background: #00b894; bottom: -100px; left: -100px; animation: floatNebula 25s infinite alternate-reverse; }
        @keyframes floatNebula {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -30px) scale(1.1); }
        }

        .sidebar {
            position: relative;
            z-index: 2;
            width: 260px;
            min-width: 260px;
            height: 100vh;
            height: 100dvh;
            background: rgba(12, 12, 30, 0.75);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border-right: 1px solid rgba(108, 92, 231, 0.12);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: 0.3s;
        }
        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.3); border-radius: 10px; }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header .avatar-mini {
            width: 36px;
            height: 36px;
            position: relative;
            flex-shrink: 0;
        }
        .sidebar-header .avatar-mini .star-dot {
            position: absolute;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 6px rgba(108, 92, 231, 0.5);
            animation: twinkleStar 2.5s ease-in-out infinite alternate;
        }
        .sidebar-header .avatar-mini .star-dot:nth-child(1) { width: 4px; height: 4px; top: 2px; left: 4px; animation-delay: 0s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(2) { width: 3px; height: 3px; top: 10px; left: 3px; animation-delay: 0.4s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(3) { width: 4px; height: 4px; top: 18px; left: 4px; animation-delay: 0.8s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(4) { width: 3px; height: 3px; top: 26px; left: 3px; animation-delay: 0.2s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(5) { width: 3px; height: 3px; top: 4px; left: 12px; animation-delay: 0.5s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(6) { width: 4px; height: 4px; top: 12px; left: 16px; animation-delay: 0.9s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(7) { width: 3px; height: 3px; top: 18px; left: 20px; animation-delay: 0.3s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(8) { width: 4px; height: 4px; top: 26px; left: 24px; animation-delay: 0.7s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(9) { width: 4px; height: 4px; top: 2px; left: 28px; animation-delay: 0.1s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(10) { width: 3px; height: 3px; top: 10px; left: 29px; animation-delay: 0.5s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(11) { width: 4px; height: 4px; top: 18px; left: 28px; animation-delay: 0.9s; }
        .sidebar-header .avatar-mini .star-dot:nth-child(12) { width: 3px; height: 3px; top: 26px; left: 29px; animation-delay: 0.3s; }
        .sidebar-header .avatar-mini .tiny {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.5;
            animation: twinkleStar 3s ease-in-out infinite alternate;
        }
        .sidebar-header .avatar-mini .tiny:nth-child(13) { width: 2px; height: 2px; top: 0px; left: 14px; animation-delay: 0.2s; }
        .sidebar-header .avatar-mini .tiny:nth-child(14) { width: 2px; height: 2px; top: 32px; left: 12px; animation-delay: 0.6s; }
        .sidebar-header .avatar-mini .tiny:nth-child(15) { width: 2px; height: 2px; top: 6px; left: 34px; animation-delay: 1s; }
        .sidebar-header .avatar-mini .tiny:nth-child(16) { width: 2px; height: 2px; top: 20px; left: -2px; animation-delay: 0.4s; }
        .sidebar-header .avatar-mini .tiny:nth-child(17) { width: 2px; height: 2px; top: 34px; left: 22px; animation-delay: 0.8s; }

        @keyframes twinkleStar {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        .sidebar-header .brand {
            font-size: 18px;
            font-weight: 700;
            color: #e0e0ff;
        }
        .sidebar-header .brand .hl {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .settings-btn-sidebar {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
            font-size: 18px;
            color: #8888bb;
        }
        .settings-btn-sidebar:hover {
            background: rgba(108, 92, 231, 0.15);
            border-color: rgba(108, 92, 231, 0.3);
            color: #e0e0ff;
        }

        .new-chat-btn {
            padding: 10px 16px;
            border: 1px solid rgba(108, 92, 231, 0.25);
            border-radius: 12px;
            background: rgba(108, 92, 231, 0.08);
            color: #c0c0e0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            width: 100%;
        }
        .new-chat-btn:hover {
            background: rgba(108, 92, 231, 0.15);
            border-color: rgba(108, 92, 231, 0.4);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.2); border-radius: 10px; }

        .chat-item {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: 0.3s;
            color: #8888bb;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }
        .chat-item:hover {
            background: rgba(255,255,255,0.03);
            color: #d0d0f0;
        }
        .chat-item.active {
            background: rgba(108, 92, 231, 0.12);
            border-color: rgba(108, 92, 231, 0.2);
            color: #e0e0ff;
        }
        .chat-item .chat-icon { 
            font-size: 16px; 
            opacity: 0.5;
            font-family: 'Segoe UI', sans-serif;
        }
        .chat-item .chat-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-item .chat-del {
            opacity: 0;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            color: #555577;
            font-family: 'Segoe UI', sans-serif;
        }
        .chat-item:hover .chat-del { opacity: 1; }
        .chat-item .chat-del:hover { color: #e17055; }

        /* Настройки */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .settings-panel {
            background: rgba(20, 20, 50, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(108, 92, 231, 0.2);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-overlay.show .settings-panel {
            transform: scale(1);
        }
        .settings-panel h2 {
            color: #e0e0ff;
            font-size: 20px;
            margin-bottom: 6px;
        }
        .settings-panel .sub {
            color: #666688;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .settings-panel .close-settings {
            float: right;
            background: none;
            border: none;
            color: #555577;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .settings-panel .close-settings:hover { color: #e0e0ff; }

        .setting-group {
            margin-bottom: 20px;
        }
        .setting-group label {
            display: block;
            color: #8888bb;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .setting-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.3);
            color: #e0e0ff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            appearance: none;
            cursor: pointer;
        }
        .setting-group select:focus {
            border-color: rgba(108, 92, 231, 0.3);
        }
        .setting-group select option {
            background: #1a1a3a;
            color: #e0e0ff;
        }
        .setting-group .api-key-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.3);
            color: #e0e0ff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            font-family: monospace;
        }
        .setting-group .api-key-input:focus {
            border-color: rgba(108, 92, 231, 0.3);
        }
        .setting-group .api-key-input::placeholder {
            color: #444466;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .theme-toggle {
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: #8888bb;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            margin-bottom: 6px;
            margin-right: 6px;
        }
        .theme-toggle:hover {
            background: rgba(108, 92, 231, 0.1);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: #00b894; box-shadow: 0 0 10px #00b894; }
        .status-dot.offline { background: #e17055; box-shadow: 0 0 10px #e17055; }
        .status-dot.searching { background: #fdcb6e; box-shadow: 0 0 10px #fdcb6e; animation: pulse 1s infinite; }
        .status-dot.thinking { background: #74b9ff; box-shadow: 0 0 10px #74b9ff; animation: pulse 0.8s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .ai-status {
            font-size: 12px;
            color: #666688;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .main-area {
            position: relative;
            z-index: 2;
            flex: 1;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 26, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            min-height: 64px;
        }
        .chat-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }
        .chat-header .right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-header .left .avatar-mini {
            width: 32px;
            height: 32px;
            position: relative;
            flex-shrink: 0;
        }
        .chat-header .left .avatar-mini .star-dot {
            position: absolute;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 6px rgba(108, 92, 231, 0.5);
            animation: twinkleStar 2.5s ease-in-out infinite alternate;
        }
        .chat-header .left .avatar-mini .star-dot:nth-child(1) { width: 3px; height: 3px; top: 2px; left: 3px; animation-delay: 0s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(2) { width: 2px; height: 2px; top: 9px; left: 2px; animation-delay: 0.4s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(3) { width: 3px; height: 3px; top: 16px; left: 3px; animation-delay: 0.8s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(4) { width: 2px; height: 2px; top: 23px; left: 2px; animation-delay: 0.2s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(5) { width: 2px; height: 2px; top: 3px; left: 10px; animation-delay: 0.5s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(6) { width: 3px; height: 3px; top: 10px; left: 14px; animation-delay: 0.9s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(7) { width: 2px; height: 2px; top: 16px; left: 18px; animation-delay: 0.3s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(8) { width: 3px; height: 3px; top: 23px; left: 22px; animation-delay: 0.7s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(9) { width: 3px; height: 3px; top: 2px; left: 25px; animation-delay: 0.1s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(10) { width: 2px; height: 2px; top: 9px; left: 26px; animation-delay: 0.5s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(11) { width: 3px; height: 3px; top: 16px; left: 25px; animation-delay: 0.9s; }
        .chat-header .left .avatar-mini .star-dot:nth-child(12) { width: 2px; height: 2px; top: 23px; left: 26px; animation-delay: 0.3s; }
        .chat-header .left .avatar-mini .tiny {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.5;
            animation: twinkleStar 3s ease-in-out infinite alternate;
        }
        .chat-header .left .avatar-mini .tiny:nth-child(13) { width: 1.5px; height: 1.5px; top: 0px; left: 12px; animation-delay: 0.2s; }
        .chat-header .left .avatar-mini .tiny:nth-child(14) { width: 1.5px; height: 1.5px; top: 28px; left: 10px; animation-delay: 0.6s; }
        .chat-header .left .avatar-mini .tiny:nth-child(15) { width: 1.5px; height: 1.5px; top: 5px; left: 30px; animation-delay: 1s; }
        .chat-header .left .avatar-mini .tiny:nth-child(16) { width: 1.5px; height: 1.5px; top: 18px; left: -1px; animation-delay: 0.4s; }
        .chat-header .left .avatar-mini .tiny:nth-child(17) { width: 1.5px; height: 1.5px; top: 30px; left: 20px; animation-delay: 0.8s; }

        .chat-header .left .chat-title {
            color: #e0e0ff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .chat-header .left .chat-title .hl {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
            color: #8888bb;
            flex-shrink: 0;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 300;
        }
        .header-btn:hover {
            background: rgba(108, 92, 231, 0.15);
            border-color: rgba(108, 92, 231, 0.3);
            color: #e0e0ff;
        }
        .header-btn.danger:hover { color: #e17055; }

        .done-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0, 206, 201, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-left: 12px;
            font-family: 'Segoe UI', sans-serif;
        }
        .done-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(0, 206, 201, 0.4);
        }

        .menu-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
            order: -1;
        }
        .menu-btn:hover {
            background: rgba(108, 92, 231, 0.15);
        }
        .menu-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: #8888bb;
            border-radius: 2px;
            transition: 0.3s;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.2); border-radius: 10px; }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: slideUp 0.3s ease;
        }
        .msg.user { align-self: flex-end; }
        .msg.ai { align-self: flex-start; }

        .msg .bubble {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.6;
            word-wrap: break-word;
            transition: background 0.3s, color 0.3s;
        }
        .msg.user .bubble {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.ai .bubble {
            background: rgba(255,255,255,0.04);
            color: #c8c8e8;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .msg .sender {
            font-size: 10px;
            color: #444466;
            margin-bottom: 3px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(108, 92, 231, 0.1);
            border-top: 5px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loading-text {
            color: #e0e0ff;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .result-panel {
            background: rgba(20, 20, 50, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 30px;
            max-width: 700px;
            width: 92%;
            max-height: 85vh;
            border: 1px solid rgba(108, 92, 231, 0.2);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transform: scale(0.9);
            transition: 0.3s;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .result-overlay.show .result-panel {
            transform: scale(1);
        }
        .result-panel::-webkit-scrollbar { width: 4px; }
        .result-panel::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.3); border-radius: 10px; }

        .result-panel .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .result-panel .top h2 {
            color: #e0e0ff;
            font-size: 20px;
        }
        .result-panel .top .close-result {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 6px 16px;
            color: #8888bb;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }
        .result-panel .top .close-result:hover {
            background: rgba(255,50,50,0.1);
            border-color: rgba(255,50,50,0.2);
            color: #e0e0ff;
        }

        #gameZone {
            width: 100%;
            height: 350px;
            background: #000;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid rgba(108, 92, 231, 0.15);
            margin-bottom: 14px;
        }
        .game-btn {
            padding: 12px 24px;
            background: #6c5ce7;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.2s;
            font-family: 'Segoe UI', sans-serif;
        }
        .game-btn:hover { transform: scale(1.05); }
        #player { width: 24px; height: 24px; background: #00b894; position: absolute; border-radius: 6px; left: 50px; top: 150px; display: none; box-shadow: 0 0 10px #00b894; }
        #monster { width: 30px; height: 30px; background: #e17055; position: absolute; border-radius: 50%; right: 40px; top: 147px; display: none; box-shadow: 0 0 10px #e17055; }
        #scoreBoard { position: absolute; top: 14px; left: 16px; display: none; font-weight: bold; font-size: 16px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-family: 'Segoe UI', sans-serif; }

        .result-panel .result-content {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(108, 92, 231, 0.1);
            white-space: pre-wrap;
            color: #d0d0f0;
            font-size: 14px;
            line-height: 1.8;
            font-family: 'Courier New', monospace;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }
        .result-panel .result-content::-webkit-scrollbar { width: 4px; }
        .result-panel .result-content::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.3); border-radius: 10px; }
        .result-panel .copy-btn {
            align-self: flex-start;
            padding: 10px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: none;
            font-family: 'Segoe UI', sans-serif;
        }
        .result-panel .copy-btn:hover { transform: scale(1.03); }

        .input-area {
            padding: 12px 24px 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
            background: rgba(10, 10, 26, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            z-index: 5;
            transition: transform 0.15s ease;
        }
        .input-wrapper {
            background: rgba(255,255,255,0.04);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: rgba(108, 92, 231, 0.3);
            background: rgba(255,255,255,0.06);
        }
        .input-row {
            display: flex;
            align-items: center;
            padding: 4px 12px 4px 14px;
            gap: 12px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #f0f0ff;
            font-size: 14px;
            outline: none;
            min-width: 0;
        }
        .input-row input::placeholder { color: #444466; }
        
        .input-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            transition: 0.2s;
            color: #8888bb;
        }
        .input-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .icon-clip {
            width: 14px;
            height: 22px;
            border: 2px solid #8888bb;
            border-radius: 10px;
            transform: rotate(45deg);
            position: relative;
        }
        .icon-clip::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 1px;
            width: 6px;
            height: 12px;
            border: 2px solid #8888bb;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }

        .icon-mic {
            width: 8px;
            height: 14px;
            background: #8888bb;
            border-radius: 4px;
            position: relative;
            margin-top: -4px;
        }
        .icon-mic::before {
            content: '';
            position: absolute;
            top: 4px;
            left: -4px;
            width: 12px;
            height: 8px;
            border: 2px solid #8888bb;
            border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .icon-mic::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 3px;
            width: 2px;
            height: 5px;
            background: #8888bb;
            box-shadow: -2px 4px 0 1px #8888bb;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(108, 92, 231, 0.4); }

        .send-icon {
            position: relative;
            width: 22px;
            height: 22px;
        }
        .send-icon .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent white;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
        }
        .send-icon .arrow::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -16px;
            width: 10px;
            height: 6px;
            border-left: 2px solid rgba(255,255,255,0.4);
            border-bottom: 2px solid rgba(255,255,255,0.4);
            border-radius: 0 0 0 4px;
            transform: rotate(45deg);
        }
        .send-icon .orbit {
            position: absolute;
            top: -2px;
            left: -2px;
            width: 26px;
            height: 26px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: orbitSpin 6s linear infinite;
        }
        .send-icon .orbit-dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
        }
        @keyframes orbitSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6c5ce7;
            margin: 0 3px;
            animation: typingAnim 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area.keyboard-active {
            transform: translateY(-10px);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                width: 280px;
                z-index: 100;
                transition: 0.3s;
                height: 100vh;
                height: 100dvh;
                border-radius: 0 20px 20px 0;
            }
            .sidebar.open { left: 0; }
            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 99;
                opacity: 0;
                pointer-events: none;
                transition: 0.3s;
            }
            .sidebar-overlay.show { opacity: 1; pointer-events: all; }
            .msg { max-width: 95%; }
            .chat-header .left .chat-title { font-size: 18px; }
            .input-area { 
                padding: 10px 16px 14px; 
                transition: transform 0.15s ease;
            }
            .input-btn .icon-clip, .input-btn .icon-mic { display: none; }
            .header-btn { width: 32px; height: 32px; font-size: 14px; }
            .done-btn { font-size: 12px; padding: 6px 14px; margin-left: 6px; }
            .send-btn { width: 36px; height: 36px; }
            .send-icon { width: 18px; height: 18px; }
            .send-icon .arrow { border-width: 6px 0 6px 12px; }
            .send-icon .orbit { width: 22px; height: 22px; }
            .chat-header { padding: 12px 16px; }
            .ai-status { font-size: 10px; padding: 2px 8px; }
            .settings-panel { padding: 20px; }
        }
        @media (min-width: 769px) { .menu-btn { display: none; } }

        @media (max-width: 480px) {
            .chat-header { padding: 10px 12px; min-height: 56px; }
            .chat-messages { padding: 12px; }
            .input-area { padding: 8px 10px 12px; }
            .input-row { padding: 2px 2px 2px 12px; gap: 4px; }
            .input-row input { font-size: 13px; padding: 8px 0; }
            .msg .bubble { font-size: 13px; padding: 10px 14px; }
            .result-panel { padding: 16px; }
            .header-btn { width: 28px; height: 28px; font-size: 12px; border-radius: 8px; }
            .done-btn { font-size: 11px; padding: 5px 12px; }
            .chat-header .left .chat-title { font-size: 16px; }
            .send-btn { width: 32px; height: 32px; }
            .send-icon { width: 16px; height: 16px; }
            .send-icon .arrow { border-width: 5px 0 5px 10px; }
            .send-icon .orbit { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>

    <div class="stars-bg" id="starsBg"></div>
    <div class="nebula-bg nebula-bg1"></div>
    <div class="nebula-bg nebula-bg2"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="left">
                <div class="avatar-mini">
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="tiny"></div><div class="tiny"></div><div class="tiny"></div>
                    <div class="tiny"></div><div class="tiny"></div>
                </div>
                <div class="brand"><span class="hl" id="sidebarBrand">Nova</span></div>
            </div>
            <button class="settings-btn-sidebar" id="settingsBtnSidebar">⚙</button>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ Создать чат</button>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <button class="close-settings" id="closeSettings">✕</button>
            <h2>Настройки</h2>
            <div class="sub">Настрой внешний вид и ИИ</div>
            
            <div class="setting-group">
                <label>Имя ИИ (над сообщениями)</label>
                <input type="text" id="aiNameInput" value="Nova" placeholder="Введите имя...">
            </div>

            <div class="setting-group">
                <label>Режим ИИ</label>
                <select id="aiMode">
                    <option value="auto">🤖 Умный (авто)</option>
                    <option value="web">🌐 Только интернет</option>
                    <option value="ai">🧠 Только ИИ</option>
                    <option value="hybrid">⚡ Гибрид (ИИ + интернет)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Провайдер ИИ</label>
                <select id="aiProvider">
                    <option value="openai">OpenAI (ChatGPT)</option>
                    <option value="deepseek">DeepSeek</option>
                </select>
            </div>

            <div class="setting-group">
                <label>API Ключ</label>
                <input type="password" class="api-key-input" id="apiKeyInput" placeholder="Вставь ключ...">
                <div style="font-size:11px;color:#444466;margin-top:4px;">
                    Для OpenAI: <a href="https://platform.openai.com/api-keys" target="_blank" style="color:#6c5ce7;">получить ключ</a> 
                    | Для DeepSeek: <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#6c5ce7;">получить ключ</a>
                </div>
            </div>

            <div class="setting-group">
                <label>Модель</label>
                <select id="aiModel">
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="gpt-4">GPT-4</option>
                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                    <option value="deepseek-chat">DeepSeek Chat</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Стиль ответов</label>
                <select id="responseStyle">
                    <option value="concise">Кратко (рекомендуется)</option>
                    <option value="detailed">Подробно</option>
                    <option value="creative">Креативно</option>

            </div>

            <div class="setting-group">
                <label>Цвет сообщений</label>
                <div class="color-options" id="settingsColorOptions">
                    <div class="color-option active" style="background: #6c5ce7;" data-color="#6c5ce7"></div>
                    <div class="color-option" style="background: #00b894;" data-color="#00b894"></div>
                    <div class="color-option" style="background: #e17055;" data-color="#e17055"></div>
                    <div class="color-option" style="background: #fdcb6e;" data-color="#fdcb6e"></div>
                    <div class="color-option" style="background: #74b9ff;" data-color="#74b9ff"></div>
                    <div class="color-option" style="background: #fd79a8;" data-color="#fd79a8"></div>
                    <div class="color-option" style="background: #a29bfe;" data-color="#a29bfe"></div>
                    <div class="color-option" style="background: #55efc4;" data-color="#55efc4"></div>
                </div>
            </div>

            <div class="setting-group">
                <label>Быстрые цвета</label>
                <div class="preset-colors">

                    <button class="color-btn" data-color="#00b894">Изумрудный</button>
                    <button class="color-btn" data-color="#e17055">Коралловый</button>
                    <button class="color-btn" data-color="#fdcb6e">Золотой</button>
                    <button class="color-btn" data-color="#74b9ff">Голубой</button>
                    <button class="color-btn" data-color="#fd79a8">Розовый</button>
                </div>
            </div>

            <div class="setting-group">
                <button class="theme-toggle" id="themeToggle">🌓 Сменить тему</button>
                <button class="theme-toggle" id="testConnectionBtn">🔌 Проверить подключение</button>
                <span id="connectionStatus" style="margin-left:8px;color:#666688;font-size:13px;"></span>
            </div>

            <div class="setting-group">
                <button class="theme-toggle" id="exportChatsBtn">💾 Экспорт</button>
                <button class="theme-toggle" id="importChatsBtn">📂 Импорт</button>
            </div>
        </div>
    </div>

    <div class="main-area">
        <div class="chat-header">
            <div class="left">
                <button class="menu-btn" id="menuToggle">
                    <span></span><span></span><span></span>
                </button>
                <div class="avatar-mini">
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="star-dot"></div><div class="star-dot"></div><div class="star-dot"></div>
                    <div class="tiny"></div><div class="tiny"></div><div class="tiny"></div>
                    <div class="tiny"></div><div class="tiny"></div>
                </div>
                <div class="chat-title"><span class="hl" id="chatTitle">Nova</span></div>

                <button class="header-btn" id="undoChatBtn" title="Отменить">↺</button>

                    <button class="input-btn" id="voiceInputBtn" title="Голосовой ввод"><div class="icon-mic"></div></button>
                    <input type="text" id="userInput" placeholder="Опиши, что хочешь создать..." />
                    <button class="send-btn" id="sendBtn">

    <div class="result-overlay" id="resultOverlay">
        <div class="result-panel">
            <div class="top">

                <button class="close-result" id="closeResult">Закрыть</button>
