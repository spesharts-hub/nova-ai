<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova — Умный ИИ помощник</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        html,body{overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0}
        body{background:#0a0a1a;display:flex;touch-action:none;transition:background .3s}
        body.light-theme{background:#f0f0fa}
        body.light-theme .stars-bg,body.light-theme .nebula-bg{display:none}
        body.light-theme .sidebar{background:rgba(240,240,250,.92);border-right:1px solid rgba(108,92,231,.1)}
        body.light-theme .sidebar-header .brand{color:#2d2d44}
        body.light-theme .chat-item{color:#555577}
        body.light-theme .chat-item:hover{background:rgba(108,92,231,.05);color:#2d2d44}
        body.light-theme .chat-item.active{background:rgba(108,92,231,.08)}
        body.light-theme .main-area{background:rgba(240,240,250,.6)}
        body.light-theme .chat-header{border-bottom:1px solid rgba(0,0,0,.04)}
        body.light-theme .chat-header .left .chat-title{color:#2d2d44}
        body.light-theme .msg.ai .bubble{background:rgba(0,0,0,.04);color:#333355;border:1px solid rgba(0,0,0,.04)}
        body.light-theme .input-area{background:rgba(240,240,250,.8);border-top:1px solid rgba(0,0,0,.04)}
        body.light-theme .input-wrapper{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.06)}
        body.light-theme .input-row input{color:#2d2d44}
        body.light-theme .input-row input::placeholder{color:#9999bb}
        body.light-theme .settings-panel{background:rgba(240,240,250,.95)}
        body.light-theme .settings-panel h2{color:#2d2d44}
        body.light-theme .setting-group label{color:#666688}
        body.light-theme .setting-group input[type=text]{background:rgba(0,0,0,.04);color:#2d2d44;border:1px solid rgba(0,0,0,.08)}
        body.light-theme .result-panel{background:rgba(240,240,250,.95)}
        body.light-theme .result-panel .top h2{color:#2d2d44}
        body.light-theme .result-panel .result-content{background:rgba(0,0,0,.04);color:#333355}
        body.light-theme .modal-panel{background:rgba(240,240,250,.95)}
        body.light-theme .modal-panel h2{color:#2d2d44}
        body.light-theme .modal-panel input[type=text],body.light-theme .modal-panel input[type=password],body.light-theme .modal-panel input[type=email]{background:rgba(0,0,0,.04);color:#2d2d44;border:1px solid rgba(0,0,0,.08)}
        .stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at bottom,#1B2735 0,#090A0F 100%)}
        .star-bg{position:absolute;background:#fff;border-radius:50%;animation:twinkleBg var(--duration) infinite ease-in-out}
        @keyframes twinkleBg{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        .nebula-bg{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;z-index:0;pointer-events:none}
        .nebula-bg1{width:500px;height:500px;background:#6c5ce7;top:-100px;right:-100px;animation:floatNebula 20s infinite alternate}
        .nebula-bg2{width:400px;height:400px;background:#00b894;bottom:-100px;left:-100px;animation:floatNebula 25s infinite alternate-reverse}
        @keyframes floatNebula{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,-30px) scale(1.1)}}
        .sidebar{position:relative;z-index:2;width:260px;min-width:260px;height:100vh;height:100dvh;background:rgba(12,12,30,.75);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border-right:1px solid rgba(108,92,231,.12);padding:20px 16px;display:flex;flex-direction:column;overflow-y:auto;transition:.3s}
        .sidebar::-webkit-scrollbar{width:3px}
        .sidebar::-webkit-scrollbar-thumb{background:rgba(108,92,231,.3);border-radius:10px}
        .sidebar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.05)}
        .sidebar-header .left{display:flex;align-items:center;gap:10px}
        .sidebar-header .avatar-mini{width:36px;height:36px;position:relative;flex-shrink:0}
        .sidebar-header .avatar-mini .star-dot{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(108,92,231,.5);animation:twinkleStar 2.5s ease-in-out infinite alternate}
        .sidebar-header .avatar-mini .star-dot:nth-child(1){width:4px;height:4px;top:2px;left:4px;animation-delay:0s}
        .sidebar-header .avatar-mini .star-dot:nth-child(2){width:3px;height:3px;top:10px;left:3px;animation-delay:.4s}
        .sidebar-header .avatar-mini .star-dot:nth-child(3){width:4px;height:4px;top:18px;left:4px;animation-delay:.8s}
        .sidebar-header .avatar-mini .star-dot:nth-child(4){width:3px;height:3px;top:26px;left:3px;animation-delay:.2s}
        .sidebar-header .avatar-mini .star-dot:nth-child(5){width:3px;height:3px;top:4px;left:12px;animation-delay:.5s}
        .sidebar-header .avatar-mini .star-dot:nth-child(6){width:4px;height:4px;top:12px;left:16px;animation-delay:.9s}
        .sidebar-header .avatar-mini .star-dot:nth-child(7){width:3px;height:3px;top:18px;left:20px;animation-delay:.3s}
        .sidebar-header .avatar-mini .star-dot:nth-child(8){width:4px;height:4px;top:26px;left:24px;animation-delay:.7s}
        .sidebar-header .avatar-mini .star-dot:nth-child(9){width:4px;height:4px;top:2px;left:28px;animation-delay:.1s}
        .sidebar-header .avatar-mini .star-dot:nth-child(10){width:3px;height:3px;top:10px;left:29px;animation-delay:.5s}
        .sidebar-header .avatar-mini .star-dot:nth-child(11){width:4px;height:4px;top:18px;left:28px;animation-delay:.9s}
        .sidebar-header .avatar-mini .star-dot:nth-child(12){width:3px;height:3px;top:26px;left:29px;animation-delay:.3s}
        .sidebar-header .avatar-mini .tiny{position:absolute;border-radius:50%;background:#fff;opacity:.5;animation:twinkleStar 3s ease-in-out infinite alternate}
        .sidebar-header .avatar-mini .tiny:nth-child(13){width:2px;height:2px;top:0;left:14px;animation-delay:.2s}
        .sidebar-header .avatar-mini .tiny:nth-child(14){width:2px;height:2px;top:32px;left:12px;animation-delay:.6s}
        .sidebar-header .avatar-mini .tiny:nth-child(15){width:2px;height:2px;top:6px;left:34px;animation-delay:1s}
        .sidebar-header .avatar-mini .tiny:nth-child(16){width:2px;height:2px;top:20px;left:-2px;animation-delay:.4s}
        .sidebar-header .avatar-mini .tiny:nth-child(17){width:2px;height:2px;top:34px;left:22px;animation-delay:.8s}
        @keyframes twinkleStar{0%{opacity:.3;transform:scale(.8)}100%{opacity:1;transform:scale(1.3)}}
        .sidebar-header .brand{font-size:18px;font-weight:700;color:#e0e0ff}
        .sidebar-header .brand .hl{background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .profile-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;font-size:18px;color:#8888bb}
        .profile-btn:hover{background:rgba(108,92,231,.15);border-color:rgba(108,92,231,.3);color:#e0e0ff}
        .coins-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;font-size:14px;color:#fdcb6e;font-weight:700;position:relative}
        .coins-btn:hover{background:rgba(108,92,231,.15);border-color:rgba(108,92,231,.3);color:#fdcb6e}
        .settings-btn-sidebar{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;flex-shrink:0;font-size:18px;color:#8888bb}
        .settings-btn-sidebar:hover{background:rgba(108,92,231,.15);border-color:rgba(108,92,231,.3);color:#e0e0ff}
        .new-chat-btn{padding:10px 16px;border:1px solid rgba(108,92,231,.25);border-radius:12px;background:rgba(108,92,231,.08);color:#c0c0e0;font-size:14px;font-weight:500;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:8px;margin-bottom:16px;width:100%}
        .new-chat-btn:hover{background:rgba(108,92,231,.15);border-color:rgba(108,92,231,.4)}
        .chat-list{flex:1;overflow-y:auto}
        .chat-list::-webkit-scrollbar{width:3px}
        .chat-list::-webkit-scrollbar-thumb{background:rgba(108,92,231,.2);border-radius:10px}
        .chat-item{padding:10px 14px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:.3s;color:#8888bb;font-size:14px;display:flex;align-items:center;gap:10px;border:1px solid transparent}
        .chat-item:hover{background:rgba(255,255,255,.03);color:#d0d0f0}
        .chat-item.active{background:rgba(108,92,231,.12);border-color:rgba(108,92,231,.2);color:#e0e0ff}
        .chat-item .chat-icon{font-size:16px;opacity:.5;font-family:'Segoe UI',sans-serif}
        .chat-item .chat-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .chat-item .chat-del{opacity:0;cursor:pointer;transition:.3s;font-size:14px;color:#555577;font-family:'Segoe UI',sans-serif}
        .chat-item:hover .chat-del{opacity:1}
        .chat-item .chat-del:hover{color:#e17055}
        .settings-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;opacity:0;pointer-events:none;transition:.3s;display:flex;align-items:center;justify-content:center}
        .settings-overlay.show{opacity:1;pointer-events:all}
        .settings-panel{background:rgba(20,20,50,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:28px;padding:30px;max-width:420px;width:90%;border:1px solid rgba(108,92,231,.2);box-shadow:0 30px 80px rgba(0,0,0,.5);transform:scale(.9);transition:.3s;max-height:90vh;overflow-y:auto}
        .settings-overlay.show .settings-panel{transform:scale(1)}
        .settings-panel h2{color:#e0e0ff;font-size:20px;margin-bottom:6px}
        .settings-panel .sub{color:#666688;font-size:13px;margin-bottom:24px}
        .settings-panel .close-settings{float:right;background:0 0;border:none;color:#555577;font-size:24px;cursor:pointer;transition:.3s}
        .settings-panel .close-settings:hover{color:#e0e0ff}
        .setting-group{margin-bottom:20px}
        .setting-group label{display:block;color:#8888bb;font-size:13px;font-weight:500;margin-bottom:6px}
        .setting-group input[type=text]{width:100%;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.3);color:#e0e0ff;font-size:14px;outline:0;transition:.3s}
        .setting-group input[type=text]:focus{border-color:rgba(108,92,231,.3)}
        .color-options{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
        .color-option{width:38px;height:38px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.3s}
        .color-option:hover{transform:scale(1.1)}
        .color-option.active{border-color:#fff;box-shadow:0 0 20px rgba(108,92,231,.4)}
        .color-option.locked{opacity:.4;filter:grayscale(.6);cursor:pointer;position:relative}
        .color-option.locked::after{content:'🔒';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px}
        .theme-toggle{padding:8px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#8888bb;cursor:pointer;transition:.3s;font-size:13px;margin-right:6px}
        .theme-toggle:hover{background:rgba(108,92,231,.1);border-color:rgba(108,92,231,.2)}
        .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
        .status-dot.online{background:#00b894;box-shadow:0 0 10px #00b894}
        .status-dot.offline{background:#e17055;box-shadow:0 0 10px #e17055}
        .status-dot.searching{background:#fdcb6e;box-shadow:0 0 10px #fdcb6e;animation:pulse 1s infinite}
        .status-dot.thinking{background:#74b9ff;box-shadow:0 0 10px #74b9ff;animation:pulse .8s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .ai-status{font-size:12px;color:#666688;display:flex;align-items:center;gap:4px;margin-left:8px;background:rgba(0,0,0,.2);padding:4px 10px;border-radius:20px}
        .main-area{position:relative;z-index:2;flex:1;height:100vh;height:100dvh;display:flex;flex-direction:column;background:rgba(10,10,26,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);min-width:0}
        .chat-header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;min-height:64px}
        .chat-header .left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;flex-wrap:wrap}
        .chat-header .right{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .chat-header .left .avatar-mini{width:32px;height:32px;position:relative;flex-shrink:0}
        .chat-header .left .avatar-mini .star-dot{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 6px rgba(108,92,231,.5);animation:twinkleStar 2.5s ease-in-out infinite alternate}
        .chat-header .left .avatar-mini .star-dot:nth-child(1){width:3px;height:3px;top:2px;left:3px;animation-delay:0s}
        .chat-header .left .avatar-mini .star-dot:nth-child(2){width:2px;height:2px;top:9px;left:2px;animation-delay:.4s}
        .chat-header .left .avatar-mini .star-dot:nth-child(3){width:3px;height:3px;top:16px;left:3px;animation-delay:.8s}
        .chat-header .left .avatar-mini .star-dot:nth-child(4){width:2px;height:2px;top:23px;left:2px;animation-delay:.2s}
        .chat-header .left .avatar-mini .star-dot:nth-child(5){width:2px;height:2px;top:3px;left:10px;animation-delay:.5s}
        .chat-header .left .avatar-mini .star-dot:nth-child(6){width:3px;height:3px;top:10px;left:14px;animation-delay:.9s}
        .chat-header .left .avatar-mini .star-dot:nth-child(7){width:2px;height:2px;top:16px;left:18px;animation-delay:.3s}
        .chat-header .left .avatar-mini .star-dot:nth-child(8){width:3px;height:3px;top:23px;left:22px;animation-delay:.7s}
        .chat-header .left .avatar-mini .star-dot:nth-child(9){width:3px;height:3px;top:2px;left:25px;animation-delay:.1s}
        .chat-header .left .avatar-mini .star-dot:nth-child(10){width:2px;height:2px;top:9px;left:26px;animation-delay:.5s}
        .chat-header .left .avatar-mini .star-dot:nth-child(11){width:3px;height:3px;top:16px;left:25px;animation-delay:.9s}
        .chat-header .left .avatar-mini .star-dot:nth-child(12){width:2px;height:2px;top:23px;left:26px;animation-delay:.3s}
        .chat-header .left .avatar-mini .tiny{position:absolute;border-radius:50%;background:#fff;opacity:.5;animation:twinkleStar 3s ease-in-out infinite alternate}
        .chat-header .left .avatar-mini .tiny:nth-child(13){width:1.5px;height:1.5px;top:0;left:12px;animation-delay:.2s}
        .chat-header .left .avatar-mini .tiny:nth-child(14){width:1.5px;height:1.5px;top:28px;left:10px;animation-delay:.6s}
        .chat-header .left .avatar-mini .tiny:nth-child(15){width:1.5px;height:1.5px;top:5px;left:30px;animation-delay:1s}
        .chat-header .left .avatar-mini .tiny:nth-child(16){width:1.5px;height:1.5px;top:18px;left:-1px;animation-delay:.4s}
        .chat-header .left .avatar-mini .tiny:nth-child(17){width:1.5px;height:1.5px;top:30px;left:20px;animation-delay:.8s}
        .chat-header .left .chat-title{color:#e0e0ff;font-size:22px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
        .chat-header .left .chat-title .hl{background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s;font-size:16px;color:#8888bb;flex-shrink:0;font-family:'Segoe UI',sans-serif;font-weight:300}
        .header-btn:hover{background:rgba(108,92,231,.15);border-color:rgba(108,92,231,.3);color:#e0e0ff}
        .header-btn.danger:hover{color:#e17055}
        .done-btn{padding:8px 20px;border:none;border-radius:30px;background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.3s;box-shadow:0 4px 20px rgba(0,206,201,.2);display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:12px;font-family:'Segoe UI',sans-serif}
        .done-btn:hover{transform:scale(1.04);box-shadow:0 6px 30px rgba(0,206,201,.4)}
        .menu-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;width:40px;height:40px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;cursor:pointer;transition:.3s;flex-shrink:0;order:-1}
        .menu-btn:hover{background:rgba(108,92,231,.15)}
        .menu-btn span{display:block;width:20px;height:2px;background:#8888bb;border-radius:2px;transition:.3s}
        .chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;padding-bottom:10px;-webkit-overflow-scrolling:touch}
        .chat-messages::-webkit-scrollbar{width:4px}
        .chat-messages::-webkit-scrollbar-thumb{background:rgba(108,92,231,.2);border-radius:10px}
        .msg{display:flex;flex-direction:column;max-width:80%;animation:slideUp .3s ease}
        .msg.user{align-self:flex-end}
        .msg.ai{align-self:flex-start}
        .msg .bubble{padding:12px 18px;border-radius:16px;font-size:14.5px;line-height:1.6;word-wrap:break-word;transition:background .3s,color .3s}
        .msg.user .bubble{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border-bottom-right-radius:4px}
        .msg.ai .bubble{background:rgba(255,255,255,.04);color:#c8c8e8;border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,.04)}
        .msg .sender{font-size:10px;color:#444466;margin-bottom:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
        .loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center}
        .spinner{width:70px;height:70px;border:5px solid rgba(108,92,231,.1);border-top:5px solid #6c5ce7;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px}
        @keyframes spin{100%{transform:rotate(360deg)}}
        .loading-text{color:#e0e0ff;font-size:18px;font-weight:500;letter-spacing:1px}
        .result-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;opacity:0;pointer-events:none;transition:.3s;display:flex;align-items:center;justify-content:center}
        .result-overlay.show{opacity:1;pointer-events:all}
        .result-panel{background:rgba(20,20,50,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:28px;padding:30px;max-width:700px;width:92%;max-height:85vh;border:1px solid rgba(108,92,231,.2);box-shadow:0 30px 80px rgba(0,0,0,.6);transform:scale(.9);transition:.3s;overflow-y:auto;display:flex;flex-direction:column}
        .result-overlay.show .result-panel{transform:scale(1)}
        .result-panel::-webkit-scrollbar{width:4px}
        .result-panel::-webkit-scrollbar-thumb{background:rgba(108,92,231,.3);border-radius:10px}
        .result-panel .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
        .result-panel .top h2{color:#e0e0ff;font-size:20px}
        .result-panel .top .close-result{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:6px 16px;color:#8888bb;cursor:pointer;transition:.3s;font-family:'Segoe UI',sans-serif}
        .result-panel .top .close-result:hover{background:rgba(255,50,50,.1);border-color:rgba(255,50,50,.2);color:#e0e0ff}
        #gameZone{width:100%;height:350px;background:#000;border-radius:16px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff;border:1px solid rgba(108,92,231,.15);margin-bottom:14px}
        .game-btn{padding:12px 24px;background:#6c5ce7;border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:16px;font-weight:600;transition:.2s;font-family:'Segoe UI',sans-serif}

async function searchWeb(query){
try{
const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
const response = await fetch(url);
const data = await response.json();
let results = [];
if(data.AbstractText) results.push(data.AbstractText);
if(data.RelatedTopics && data.RelatedTopics.length > 0){
for(const topic of data.RelatedTopics.slice(0,3)){
if(topic.Text) results.push(topic.Text);
}
}
if(results.length === 0 && data.Results && data.Results.length > 0){
for(const res of data.Results.slice(0,2)){
if(res.Text) results.push(res.Text);
}
}
return results.length > 0 ? results.join('\n') : null;
}catch(e){return null;}
}

async function sendAIRequest(prompt, historyMessages = []){
const systemPrompt = 'Ты — Nova, умный и дружелюбный ИИ-помощник. Отвечай кратко, по существу, с заботой о пользователе. Используй простой язык. Всегда старайся помочь. Максимум 2-3 предложения.';
const messages = [{ role: 'system', content: systemPrompt }];
const recentHistory = historyMessages.slice(-10);
for(const msg of recentHistory){
messages.push({
role: msg.role === 'user' ? 'user' : 'assistant',
content: msg.content
});
}
messages.push({ role: 'user', content: prompt });
try{
const response = await fetch('/api/chat', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
messages: messages,
provider: 'deepseek',
model: 'deepseek-chat',
temperature: 0.7,
max_tokens: 200
})
});
if(!response.ok){
const error = await response.json();
return { success: false, error: error.error?.message || `HTTP ${response.status}` };
}
const data = await response.json();
return {
success: true,
content: data.choices?.[0]?.message?.content || 'Нет ответа'
};
}catch(e){
return { success: false, error: e.message || 'Ошибка запроса' };
}
}

function needsWebSearch(message){
const keywords = ['погод','новост','сегодня','завтра','вчера','последн','сейчас','курс','доллар','евро','рубль','цена','стоимость','скидк','новый','вышел','релиз','анонс','событи','мероприят','результат','матч','игр','спорт','футбол','хоккей','ваканси','работа','зарплат','бюджет','политик','акци','криптов','биткоин','эфир','рынок'];
const lower = message.toLowerCase();
return keywords.some(k => lower.includes(k));
}

async function getAIResponse(userMessage, chatHistory){
updateStatus('thinking', 'думаю...');
let webInfo = null;
let aiResponse = null;
try{
if(needsWebSearch(userMessage)){
updateStatus('searching', 'поиск...');
webInfo = await searchWeb(userMessage);
}
let enhancedPrompt = userMessage;
if(webInfo){
enhancedPrompt = `Пользователь спросил: "${userMessage}"\n\nИнформация из интернета по теме:\n${webInfo}\n\nНа основе этой информации, дай краткий ответ на вопрос пользователя.`;
}
updateStatus('thinking', 'генерация...');
const result = await sendAIRequest(enhancedPrompt, chatHistory);
if(result && result.success){
aiResponse = result.content;
}else{
aiResponse = result?.error || 'Извините, произошла ошибка. Попробуйте позже.';
}
updateStatus('online', 'готово');
return aiResponse;
}catch(e){
updateStatus('offline', 'ошибка');
return 'Произошла ошибка: ' + e.message;
}
}

const GameModule = (function(){
let gameInterval = null;
let pTop = 150, pLeft = 50, mTop = 147, mLeft = 500, score = 0;
let isPlaying = false;
function reset(){
clearInterval(gameInterval);
gameInterval = null;
isPlaying = false;
startGameBtn.style.display = 'block';
player.style.display = 'none';
monster.style.display = 'none';
scoreBoard.style.display = 'none';
gameZone.style.background = '#000';
window.onkeydown = null;
}
function start(){
reset();
startGameBtn.style.display = 'none';
player.style.display = 'block';
monster.style.display = 'block';
scoreBoard.style.display = 'block';
gameZone.style.background = '#111222';
pTop = 150; pLeft = 50; mTop = 147; mLeft = 500; score = 0;
player.style.top = pTop + 'px';
player.style.left = pLeft + 'px';
monster.style.left = mLeft + 'px';
monster.style.top = mTop + 'px';
isPlaying = true;
scoreBoard.textContent = "Счет: " + score;
window.onkeydown = function(e){
if(!isPlaying) return;
if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'ц') pTop = Math.max(0, pTop - 15);
if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'ы') pTop = Math.min(320, pTop + 15);
if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ф') pLeft = Math.max(0, pLeft - 15);
if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'в') pLeft = Math.min(570, pLeft + 15);
player.style.top = pTop + 'px';
player.style.left = pLeft + 'px';
};
gameInterval = setInterval(() => {
if(!isPlaying) return;
score++;
scoreBoard.textContent = "Счет: " + score;
if(mLeft > pLeft) mLeft -= 3; else mLeft += 3;
if(mTop > pTop) mTop -= 3; else mTop += 3;
monster.style.left = mLeft + 'px';
monster.style.top = mTop + 'px';
if(Math.abs(pLeft - mLeft) < 22 && Math.abs(pTop - mTop) < 22){
alert("Монстр поймал тебя! Твой итоговый счет: " + score);
reset();
}
}, 30);
}
function stop(){
isPlaying = false;
clearInterval(gameInterval);
reset();
}
return { start, stop, reset };
})();

<input type="password" id="confirmPassword" placeholder="Подтвердите пароль">

`);

const oldPass = document.getElementById('oldPassword').value.trim();
const newPass = document.getElementById('newPassword').value.trim();
const confirmPass = document.getElementById('confirmPassword').value.trim();
const errorEl = document.getElementById('editError');
if(!oldPass || !newPass || !confirmPass){
errorEl.textContent = 'Заполните все поля';
errorEl.style.display = 'block';
return;
}
if(newPass.length < 6){
errorEl.textContent = 'Пароль должен быть минимум 6 символов';
errorEl.style.display = 'block';
return;
}
if(newPass !== confirmPass){
errorEl.textContent = 'Пароли не совпадают';
errorEl.style.display = 'block';
return;
}
try{
const credential = firebase.auth.EmailAuthProvider.credential(userData.email, oldPass);
await currentUser.reauthenticateWithCredential(credential);
await currentUser.updatePassword(newPass);
showNotification('Пароль успешно изменён!');
closeModalFunction();
showProfile();
}catch(error){
errorEl.textContent = 'Ошибка: ' + error.message;
errorEl.style.display = 'block';
}
});
}

async function loadReceivedLetters(){
const container = document.getElementById('lettersContent');
if(!currentUser){
container.innerHTML = '<div style="color:#666688;text-align:center;padding:20px;">Войдите чтобы видеть письма</div>';
return;
}
try{
const lettersRef = db.collection('letters').where('to', '==', userData.username);
const snapshot = await lettersRef.orderBy('createdAt', 'desc').get();
if(snapshot.empty){
container.innerHTML = '<div style="color:#666688;text-align:center;padding:20px;">Нет полученных писем</div>';
return;
}
let html = '';
snapshot.forEach(doc => {
const letter = doc.data();
html += `
<div class="letter-item" data-id="${doc.id}">
<div class="from">От: ${letter.from}</div>
<div class="subject">${letter.message.slice(0,50)}${letter.message.length > 50 ? '...' : ''}</div>
<div class="preview">${letter.message}</div>
</div>
`;
});
container.innerHTML = html;
document.querySelectorAll('.letter-item').forEach(el => {
el.addEventListener('click', async () => {
const id = el.dataset.id;
const doc = await db.collection('letters').doc(id).get();
const letter = doc.data();
alert(`От: ${letter.from}\n\n${letter.message}`);
});
});
}catch(error){
container.innerHTML = '<div style="color:#e17055;text-align:center;padding:20px;">Ошибка загрузки</div>';
}
}

function loadSendLetterForm(){
const container = document.getElementById('lettersContent');
container.innerHTML = `
<div id="sendError" class="error-text"></div>
<input type="text" id="letterTo" placeholder="Кому (никнейм)">
<textarea id="letterMessage" placeholder="Текст письма..."></textarea>
<button class="btn-primary" id="sendLetterBtn">Отправить</button>
`;
document.getElementById('sendLetterBtn').addEventListener('click', async () => {
const to = document.getElementById('letterTo').value.trim();
const message = document.getElementById('letterMessage').value.trim();
const errorEl = document.getElementById('sendError');
if(!to || !message){
errorEl.textContent = 'Заполните все поля';
errorEl.style.display = 'block';
return;
}
if(!currentUser){
errorEl.textContent = 'Сначала войдите в аккаунт';
errorEl.style.display = 'block';
return;
}
try{
const usersRef = db.collection('users');
const snapshot = await usersRef.where('username', '==', to).get();
if(snapshot.empty){
errorEl.textContent = 'Пользователь не найден';
errorEl.style.display = 'block';
return;
}
await db.collection('letters').add({
from: userData.username,
to: to,
message: message,
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});
showNotification('Письмо отправлено!');
document.getElementById('letterTo').value = '';
document.getElementById('letterMessage').value = '';
errorEl.style.display = 'none';
}catch(error){
errorEl.textContent = 'Ошибка: ' + error.message;
errorEl.style.display = 'block';
}
});
}

function buyColor(color, price){
if(!currentUser){
showNotification('Сначала войдите в аккаунт');
return;
}
openModal(`
<h2>Покупка цвета</h2>
<div style="width:80px;height:80px;border-radius:50%;margin:0 auto 16px;background:${color};border:2px solid rgba(255,255,255,.1);"></div>
<div style="text-align:center;color:#e0e0ff;font-size:18px;margin-bottom:8px;">${price} 🪙</div>
<div style="text-align:center;color:#8888bb;font-size:13px;margin-bottom:16px;">Баланс: ${userData?.coins || 0} 🪙</div>
<button class="btn-primary" id="confirmBuyBtn">Купить</button>
<button class="btn-secondary" id="cancelBuyBtn" style="margin-top:4px;">Отмена</button>
`);
document.getElementById('confirmBuyBtn').addEventListener('click', async () => {
if((userData?.coins || 0) < price){
showNotification('Недостаточно монет!');
return;
}
try{
await db.collection('users').doc(currentUser.uid).update({
coins: firebase.firestore.FieldValue.increment(-price),
ownedColors: firebase.firestore.FieldValue.arrayUnion(color)
});
userData.coins -= price;
if(!userData.ownedColors) userData.ownedColors = [];
if(!userData.ownedColors.includes(color)){
userData.ownedColors.push(color);
}
localStorage.setItem('nova_user', JSON.stringify({ uid: currentUser.uid, data: userData }));
updateCoinsDisplay();
showNotification('Цвет куплен!');
closeModalFunction();
updateColorOptions();
}catch(error){
showNotification('Ошибка: ' + error.message);
}
});
document.getElementById('cancelBuyBtn').addEventListener('click', closeModalFunction);
}

function updateColorOptions(){
const container = document.getElementById('settingsColorOptions');
const owned = userData?.ownedColors || state.ownedColors;
document.querySelectorAll('.color-option').forEach(el => {
const color = el.dataset.color;
const price = el.dataset.price;
if(price){
if(owned.includes(color) || owned.includes(el.style.background)){
el.classList.remove('locked');
el.style.filter = 'none';
el.style.opacity = '1';
el.style.cursor = 'pointer';
el.style.position = 'static';
el.style.borderColor = 'transparent';
el.innerHTML = '';
}else{
el.classList.add('locked');
el.style.filter = 'grayscale(0.6)';
el.style.opacity = '0.4';
el.style.cursor = 'pointer';
el.style.position = 'relative';
el.style.borderColor = 'transparent';
el.innerHTML = '<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;">🔒</span>';
}
}
});
}

const inputArea = document.getElementById('inputArea');
window.addEventListener('resize', function(){
const isMobile = window.innerWidth <= 768;
if(isMobile){
const activeElement = document.activeElement;
if(activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')){
const rect = activeElement.getBoundingClientRect();
const windowHeight = window.innerHeight;
const keyboardHeight = windowHeight - rect.bottom;
if(keyboardHeight > 50){
inputArea.classList.add('keyboard-active');
}else{
inputArea.classList.remove('keyboard-active');
}
}else{
inputArea.classList.remove('keyboard-active');
}
}
});
document.addEventListener('focusin', function(e){
if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA'){
setTimeout(() => {
const isMobile = window.innerWidth <= 768;
if(isMobile){
const rect = e.target.getBoundingClientRect();
const windowHeight = window.innerHeight;
const keyboardHeight = windowHeight - rect.bottom;
if(keyboardHeight > 50){
inputArea.classList.add('keyboard-active');
}
}
}, 200);
}
});
document.addEventListener('focusout', function(e){
if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA'){
inputArea.classList.remove('keyboard-active');
}
});
